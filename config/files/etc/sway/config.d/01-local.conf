# ── Fonts ─────────────────────────────────────────────────────────────────────
# Inter for window titles / borders; pango syntax: "Family [style] size"
font pango:Inter 11

# ── Background ────────────────────────────────────────────────────────────────
output * bg /usr/share/backgrounds/dev-linux/wallpaper.jpg fill

# ── Input ─────────────────────────────────────────────────────────────────────
input * {
    # Remap Caps Lock to Control
    xkb_options ctrl:nocaps
}
