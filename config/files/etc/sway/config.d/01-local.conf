# ── Fonts ─────────────────────────────────────────────────────────────────────
font pango:Inter 11

# ── Background ────────────────────────────────────────────────────────────────
output * bg /usr/share/backgrounds/dev-linux/wallpaper.jpg fill

# ── Input ─────────────────────────────────────────────────────────────────────
input * {
    xkb_options ctrl:nocaps
}

# ── Cursor ────────────────────────────────────────────────────────────────────
# Sets the actual Wayland-rendered cursor size (not just GTK's), and exports
# XCURSOR_THEME/XCURSOR_SIZE for XWayland apps too.
seat * xcursor_theme Adwaita 48

# ── Terminal ──────────────────────────────────────────────────────────────────
# sway-config-fedora's /etc/sway/config sets $term to foot and binds mod+Return
# to it before our config.d/*.conf files are included, so redefining $term here
# would be too late — the bindsym must be overridden directly.
bindsym $mod+Return exec alacritty

# ── Displays ──────────────────────────────────────────────────────────────────
# kanshi (see /etc/kanshi/config) auto-disables eDP-1 when the ViewSonic
# XG3220 is connected. These are manual overrides if you want to force a
# profile regardless of the auto-detected state.
# (mod+shift+e/l are already used by sway's base config for exit/move-right.)
bindsym $mod+Shift+i exec kanshictl switch laptop
bindsym $mod+Shift+o exec kanshictl switch external

# ── Nord color palette ────────────────────────────────────────────────────────
# Polar Night
set $nord0  #2e3440
set $nord1  #3b4252
set $nord2  #434c5e
set $nord3  #4c566a
# Snow Storm
set $nord4  #d8dee9
set $nord6  #eceff4
# Frost
set $nord7  #8fbcbb
set $nord8  #88c0d0
set $nord9  #81a1c1
# Aurora
set $nord11 #bf616a
set $nord13 #ebcb8b

# ── Window decoration ─────────────────────────────────────────────────────────
default_border pixel 2
titlebar_border_thickness 2
gaps inner 0
gaps outer 0

# class                 border   backgr.  text     indicator child_border
client.focused          $nord8   $nord2   $nord6   $nord7    $nord8
client.focused_inactive $nord8   $nord0   $nord4   $nord3    $nord3
client.unfocused        $nord8   $nord0   $nord4   $nord3    $nord3
client.urgent           $nord13  $nord13  $nord0   $nord7    $nord13

# ── GTK theme (dconf / gsettings) ────────────────────────────────────────────
# Ensures GNOME-aware apps pick up Nordic even when /etc/gtk-*/settings.ini
# would be sufficient for non-dconf GTK apps.
exec_always {
    gsettings set org.gnome.desktop.interface gtk-theme      'Nordic'
    gsettings set org.gnome.desktop.interface icon-theme     'Papirus-Dark'
    gsettings set org.gnome.desktop.interface font-name      'Inter 11'
    gsettings set org.gnome.desktop.interface color-scheme   'prefer-dark'
    gsettings set org.gnome.desktop.interface cursor-theme   'Adwaita'
    gsettings set org.gnome.desktop.interface cursor-size    48
}
