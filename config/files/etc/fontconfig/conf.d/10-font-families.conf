<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Primary sans-serif: Inter, fallback to Liberation Sans -->
  <match target="pattern">
    <test name="family" qual="any">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Inter</string>
      <string>Liberation Sans</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" qual="any">
      <string>serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Liberation Serif</string>
    </edit>
  </match>

  <!-- Primary monospace: JetBrains Mono Nerd Font, fallback to JetBrains Mono -->
  <match target="pattern">
    <test name="family" qual="any">
      <string>monospace</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>JetBrainsMono Nerd Font</string>
      <string>JetBrains Mono</string>
      <string>Cascadia Code</string>
    </edit>
  </match>

  <!-- Web/UI font aliases all map to Inter -->
  <alias>
    <family>system-ui</family>
    <prefer><family>Inter</family></prefer>
  </alias>

  <alias>
    <family>ui-monospace</family>
    <default><family>monospace</family></default>
  </alias>

  <alias>
    <family>-apple-system</family>
    <prefer><family>Inter</family></prefer>
  </alias>

  <alias>
    <family>BlinkMacSystemFont</family>
    <prefer><family>Inter</family></prefer>
  </alias>

  <!-- Emoji fallback for all generic families -->
  <alias>
    <family>sans-serif</family>
    <accept><family>Noto Color Emoji</family></accept>
  </alias>

  <alias>
    <family>serif</family>
    <accept><family>Noto Color Emoji</family></accept>
  </alias>

  <alias>
    <family>monospace</family>
    <accept><family>Noto Color Emoji</family></accept>
  </alias>
</fontconfig>
